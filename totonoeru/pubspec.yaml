name: totonoeru
description: 整える — Premium productivity app. Free forever. 100% Offline.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Database ──────────────────────────────────────────────────────────────
  isar: 3.1.0
  isar_flutter_libs: 3.1.0   # native binaries — keep at 3.1.0
  path_provider: ^2.1.3

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^13.2.4

  # ── Persistence ───────────────────────────────────────────────────────────
  shared_preferences: ^2.3.2

  # ── Notifications ─────────────────────────────────────────────────────────
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # ── Animations ────────────────────────────────────────────────────────────
  flutter_animate: ^4.5.0

  # ── Recurrence ────────────────────────────────────────────────────────────
  rrule: ^0.2.7

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.4.0
  intl: ^0.19.0
  gap: ^3.0.1
  collection: ^1.18.0

  # ── Sharing + File Access ─────────────────────────────────────────────────
  share_plus: ^12.0.2
  file_picker: ^8.1.2

  # ── Charts ────────────────────────────────────────────────────────────────
  fl_chart: ^0.68.0

  # ── Home Screen Widgets ───────────────────────────────────────────────────
  home_widget: ^0.7.0

  # ── Export ────────────────────────────────────────────────────────────────
  csv: ^6.0.0
  pdf: ^3.10.8

  # ── Splash Screen ─────────────────────────────────────────────────────────
  flutter_native_splash: ^2.4.1

  # ── Immutable Models ──────────────────────────────────────────────────────
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ── Code Generation ───────────────────────────────────────────────────────
  isar_generator: 3.1.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2

# ── Flutter Native Splash Config ─────────────────────────────────────────────
flutter_native_splash:
  color: "#F4F3F0"
  color_dark: "#0F0F0E"
  image: assets/images/splash_icon.png
  darkmode_image: assets/images/splash_icon.png

# ── Flutter Config ────────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  # ── Fonts (task 1.03 + 1.04) ────────────────────────────────────────────
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600

    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500

    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansJP-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansJP-Medium.ttf
          weight: 500

  # ── Assets ──────────────────────────────────────────────────────────────
  assets:
    - assets/fonts/
    - assets/images/
    - assets/audio/
