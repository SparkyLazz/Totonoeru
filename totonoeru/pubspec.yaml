name: totonoeru
description: "整える — Premium productivity app. Free forever. 100% Offline."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.4

  # Local Database — PINNED at 3.1.0, do not upgrade during v1.0 build
  isar: 3.1.0
  isar_flutter_libs: 3.1.0

  # Settings
  shared_preferences: ^2.2.3

  # Animations
  flutter_animate: ^4.5.0

  # Date / i18n
  intl: ^0.19.0

  # IDs
  uuid: ^4.4.0

  # File / Backup / Export
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  file_picker: ^8.0.7

  # Local Notifications (zero internet)
  flutter_local_notifications: ^17.2.2

  # Recurrence
  rrule: ^0.2.6

  # Charts
  fl_chart: ^0.68.0

  # Export
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.13.1

  # Utilities
  gap: ^3.0.1
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  isar_generator: 3.1.0
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Light.ttf
          weight: 300
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-SemiBold.ttf
          weight: 600
    - family: DMMono
      fonts:
        - asset: assets/fonts/DMMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMMono-Medium.ttf
          weight: 500
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Light.ttf
          weight: 300
        - asset: assets/fonts/NotoSansJP-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansJP-Medium.ttf
          weight: 500
